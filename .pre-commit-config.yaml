repos:
  - repo: local
    hooks:
      - id: ruff-format
        name: ruff format (via uv)
        entry: uv run ruff format src tests
        language: system
        types: [python]
        pass_filenames: false
      - id: ruff-check
        name: ruff (via uv)
        entry: uv run ruff check src tests
        language: system
        types: [python]
        pass_filenames: false
      - id: ruff-ann401-advisory
        name: ruff ANN401 advisory (via uv)
        # Advisory-only gate for explicit Any usage. Keep non-blocking for now.
        entry: uv run ruff check src tests --select ANN401 --exit-zero
        language: system
        types: [python]
        pass_filenames: false
      - id: pydocstyle-check
        name: pydocstyle (via uv)
        entry: uv run pydocstyle src tests
        language: system
        types: [python]
        pass_filenames: false
      - id: pyright-check
        name: pyright (via uv)
        entry: uv run pyright src
        language: system
        types: [python]
        pass_filenames: false
      - id: file-length-check
        name: file length
        entry: uv run python scripts/check_file_length.py --warn-lines 500 --fail-lines 750
        language: system
        types: [python]
        pass_filenames: true
        files: "\\.py$"
        exclude: "^(scripts/|src/flo/render/layout_core/elk\\.py|src/flo/render/_svg_sppm_edges\\.py|tests/integration/test_cli_render_options\\.py|tests/unit/test_layout_core_elk_requests\\.py|tests/unit/test_layout_core_elk_runtime\\.py|tests/unit/test_render_artifact_backends_sppm\\.py)$"
      - id: radon-complexity
        name: radon complexity
        entry: uv run python scripts/check_complexity.py
        language: system
        pass_filenames: true
        files: "\\.py$"
        stages: ["pre-commit"]
        description: "Fail commit if any function/class complexity > 15"
      - id: vulture-check
        name: vulture (via uv)
        # Run vulture as a hard quality gate and include whitelist symbols
        # as an analyzed module so known intentional false positives are ignored.
        entry: bash -c "if [ -f vulture_whitelist.py ]; then uv run vulture src/flo tests vulture_whitelist.py --min-confidence 60; else uv run vulture src/flo tests --min-confidence 60; fi"
        language: system
        types: [python]
        pass_filenames: false
      - id: importlinter-check
        name: import-linter (via uv)
        entry: uv run lint-imports
        language: system
        pass_filenames: false
      - id: docs-governance-check
        name: docs governance (via uv)
        entry: uv run python scripts/check_docs_governance.py
        language: system
        pass_filenames: true
        files: "^(docs/|examples/|schema/|README\\.md|src/flo/services/errors\\.py)"
      - id: pytest-check
        name: pytest (via uv)
        entry: uv run pytest --cov=src/flo --cov-report=term-missing --cov-fail-under=90
        language: system
        types: [python]
        pass_filenames: false
