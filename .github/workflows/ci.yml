name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  sppm-determinism:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.14'

      - name: Prepare uv runner and project dev deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install uv
          uv sync

      - name: Run focused SPPM determinism tests
        run: >-
          uv run pytest -q
          tests/unit/test_sppm_baseline_drift.py
          tests/unit/test_layout_core_elk_requests.py
          -k 'parent_only_subprocess_edges_are_stable or test_sppm_baseline_drift'

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.14'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node runtime deps (elkjs)
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Install Graphviz runtime
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz

      - name: Prepare uv runner and project dev deps
        run: |
          python -m pip install --upgrade pip
          # Install the uv runner used by local development
          python -m pip install uv
          # Sync project dependencies into the project virtualenv using uv
          uv sync

      - name: Run pre-commit hooks (match local pre-commit)
        run: uv run pre-commit run --all-files

      - name: Enforce SPPM baseline drift gate
        run: uv run python scripts/check_sppm_baseline_drift.py

      - name: Run SPPM layout invariant suite
        run: uv run pytest -q tests/unit/test_sppm_layout_invariants.py

      - name: Run test suite with coverage
        run: uv run pytest --cov=src/flo --cov-report=term-missing --cov-fail-under=90

